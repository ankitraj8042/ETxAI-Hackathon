services:
  postgres:
    image: postgres:16-alpine
    container_name: dcbrain-postgres
    environment:
      POSTGRES_USER: dcbrain
      POSTGRES_PASSWORD: dcbrain_dev_2026
      POSTGRES_DB: dcbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: dcbrain-neo4j
    environment:
      NEO4J_AUTH: neo4j/dcbrain_neo4j_2026
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "dcbrain_neo4j_2026", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dcbrain-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: dcbrain-chroma
    ports:
      - "8100:8000"
    volumes:
      - chromadata:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

volumes:
  pgdata:
  neo4jdata:
  redisdata:
  chromadata:
